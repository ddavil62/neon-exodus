name: Build APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      # 키스토어: KEYSTORE_BASE64 시크릿이 있으면 사용, 없으면 캐시, 없으면 신규 생성
      - name: Restore keystore from cache
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: release.keystore
          key: release-keystore-neonexodus-v1

      - name: Decode keystore from secret
        if: env.KEYSTORE_BASE64 != ''
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Generate keystore (first run)
        if: steps.cache-keystore.outputs.cache-hit != 'true' && env.KEYSTORE_BASE64 == ''
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=ddavil62, OU=Dev, O=Antigravity, L=Seoul, C=KR"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Configure release signing
        working-directory: android/app
        run: |
          cat >> build.gradle << 'SIGNING'

          android {
              signingConfigs {
                  release {
                      storeFile file("../../release.keystore")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          SIGNING

      - name: Build release APK & AAB
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleRelease bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK & AAB to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.run_number }}
          name: "Dev Build #${{ github.run_number }}"
          body: |
            자동 빌드 - `${{ github.sha }}` 커밋
            ```
            ${{ github.event.head_commit.message }}
            ```
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
